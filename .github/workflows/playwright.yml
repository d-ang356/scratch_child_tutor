name: Playwright tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# checks: write is for the pass/fail summary (dorny/test-reporter).
permissions:
  contents: read
  checks: write

# Cancel a superseded run on the same ref/event so two quick pushes to main
# don't run in parallel. Jobs within a single run are not affected.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  # Detect whether the real-API secret is configured. The `secrets` context is
  # NOT available in a job-level `if` (and neither is `matrix`), so we
  # materialize the secret into a job output here and gate the real shard on
  # that output. `needs.*.outputs` IS allowed in a job-level `if`.
  check-secret:
    name: Check for Ollama API key
    runs-on: ubuntu-latest
    outputs:
      has_key: ${{ steps.set.outputs.has_key }}
    steps:
      - id: set
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
        run: |
          if [ -n "$OLLAMA_API_KEY" ]; then
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_key=false" >> "$GITHUB_OUTPUT"
          fi

  # Shard 1 — mock functional tests. Always runs. Single job, no sharding: the
  # @mock suite is small (a few tests, ~9s) and the dominant CI cost is the
  # per-shard Docker build + npm install (~30-60s), so sharding would multiply
  # that overhead for ~0s of test savings and (at 3 tests) leave an empty green
  # shard. Re-enable sharding (matrix + `--shard k/N`) once @mock grows past
  # ~10 tests.
  #
  # workers MUST stay 1 (set in playwright.config.js). The suite is NOT
  # parallel-safe at workers>1: initial.spec.js forces the first-run prefs modal
  # by deleting preferences.json, and another spec saving prefs concurrently
  # recreates the file before initial's page reads /api/preferences, so the
  # modal never opens. Reproduced (~1/8 failures at workers=2). Serial
  # execution is race-free. To raise workers later, first make initial.spec
  # independent of the shared preferences.json (e.g. mock /api/preferences).
  mock-tests:
    name: Mock functional tests
    runs-on: ubuntu-latest
    env:
      COMPOSE_PROJECT_NAME: scratch-mock
      OLLAMA_BASE: https://ollama.com
      # /api/chat is intercepted at the browser boundary, so no real Ollama call
      # is made. A dummy key just makes /api/health report connected (cloud mode).
      OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY || 'mock-dummy-key' }}
      SCRATCH_MODEL: ${{ vars.SCRATCH_MODEL || 'glm-5.2' }}
      PLAYWRIGHT_ARGS: "--grep @mock"
    steps:
      - uses: actions/checkout@v4

      - name: Run tests in containers
        run: docker compose up --abort-on-container-exit --exit-code-from tests --build

      - name: Publish pass/fail summary
        if: always() && hashFiles('test-results/junit.xml') != ''
        uses: dorny/test-reporter@v1
        # continue-on-error: reporter needs checks:write, which fork-PR tokens
        # can't grant; also tolerates any reporter hiccup without failing the
        # job (the test step already set the run's pass/fail).
        continue-on-error: true
        with:
          name: Mock functional tests
          path: test-results/junit.xml
          reporter: java-junit

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-mock
          path: playwright-report/
          retention-days: 14

  # Shard 2 — real Ollama API tests. Runs ONLY when the secret is configured.
  # Gated at the JOB level via the check-secret output (job-level `if` can read
  # needs.*.outputs but NOT secrets/matrix), so the whole job is skipped — not
  # just its steps — when there is no key.
  real-api-tests:
    name: Real Ollama API tests
    needs: check-secret
    runs-on: ubuntu-latest
    if: ${{ needs.check-secret.outputs.has_key == 'true' }}
    env:
      COMPOSE_PROJECT_NAME: scratch-real
      OLLAMA_BASE: https://ollama.com
      OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
      SCRATCH_MODEL: ${{ vars.SCRATCH_MODEL || 'gpt-oss:20b' }}
      PLAYWRIGHT_ARGS: "--grep @real"
    steps:
      - uses: actions/checkout@v4

      - name: Run tests in containers
        run: docker compose up --abort-on-container-exit --exit-code-from tests --build

      - name: Publish pass/fail summary
        if: always() && hashFiles('test-results/junit.xml') != ''
        uses: dorny/test-reporter@v1
        # continue-on-error: reporter needs checks:write, which fork-PR tokens
        # can't grant; also tolerates any reporter hiccup without failing the
        # job (the test step already set the run's pass/fail).
        continue-on-error: true
        with:
          name: Real Ollama API tests
          path: test-results/junit.xml
          reporter: java-junit

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-real
          path: playwright-report/
          retention-days: 14